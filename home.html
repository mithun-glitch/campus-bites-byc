<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Campus FoodHub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">Campus Bites</div>

<input id="searchBar" placeholder="Search stalls..." onkeyup="searchStalls()">
<button onclick="openTrack()" class="trackBtn">
Track Order
</button>
<button onclick="openCart()" class="cartBtn">
 Cart (<span id="cartCount">0</span>)
</button>

</header>
<section class="hero">

<h1>Campus Bites</h1><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
<p>Order food from your favorite campus stalls</p>
<button onclick="document.getElementById('stallSection').scrollIntoView()">
Browse Stalls
</button>

</section>

<section id="stallSection">

<h2>FOOD STALLS</h2>

<div id="stallContainer"></div>

</section>



<section id="menuSection" class="hidden">

<button class="backBtn" onclick="goHome()">← Back</button>

<h2 id="stallTitle"></h2>

<div id="menuContainer"></div>

</section>



<div id="cartPanel" class="hidden">

<button class="closeCart" onclick="closeCart()">✖</button>
<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>

<button class="checkoutBtn" onclick="showPaymentOptions()">Place Order</button></div>

<div id="paymentPopup" class="paymentPopup hidden">

<h2>Select Payment Method</h2>

<button onclick="payCOD()">Cash on Delivery</button>

<button disabled>Online Payment(coming soon)</button>

<button class="closePay" onclick="closePayment()">Cancel</button>

</div>

<div id="orderPopup" class="orderPopup hidden">

<div class="orderBox">

<h2>Order Confirmed 🎉</h2>

<p id="orderID"></p>

<p>Your food is being prepared</p>

<button onclick="goHome()">Back to Menu</button>

<button onclick="trackOrder()">Track Your Order</button>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8kNM2yoTZdaz-UE956vuTGxAccg4JXus",
  authDomain: "campus-bites-byc.firebaseapp.com",
  projectId: "campus-bites-byc",
  databaseURL: "https://campus-bites-byc-default-rtdb.firebaseio.com",
  storageBucket: "campus-bites-byc.firebasestorage.app",
  messagingSenderId: "306684832128",
  appId: "1:306684832128:web:8d50dd8718e5ec5de73965"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveOrder = function(cart,total){

const ordersRef = ref(db,"orders");

const newOrder = push(ordersRef,{
items: cart,
total: total,
status:"Preparing",
time: new Date().toString()
});

let orderId = newOrder.key;

localStorage.setItem("currentOrder",orderId);

document.getElementById("orderID").innerText="Order ID: "+orderId;

}

</script>


<script src="script.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
</html>
